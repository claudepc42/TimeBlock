<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TimeBlock — One City Block, 110 Years</title>
<style>
  :root {
    --accent: #41d8ff;
    --gold: #ffb020;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05070c; }
  body { font-family: "Segoe UI", Helvetica, Arial, sans-serif; color: #e8eef4; }
  #scene { position: fixed; inset: 0; cursor: grab; }
  #scene:active { cursor: grabbing; }
  canvas { display: block; }

  .hidden { display: none !important; }

  /* ---------- loading ---------- */
  #loading {
    position: fixed; inset: 0; z-index: 50;
    background: radial-gradient(ellipse at 50% 40%, #0d1526 0%, #05070c 75%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity .6s;
  }
  #load-inner { text-align: center; width: min(420px, 80vw); }
  #load-title {
    font-size: 44px; font-weight: 200; letter-spacing: 10px; color: #fff;
    margin-bottom: 6px;
  }
  #load-title b { font-weight: 700; color: var(--accent); }
  #load-sub {
    font-size: 13px; letter-spacing: 3px; color: #7d8ba0; margin-bottom: 38px;
    text-transform: uppercase;
  }
  #load-track {
    height: 3px; background: #1a2436; border-radius: 2px; overflow: hidden;
    margin-bottom: 12px;
  }
  #load-bar {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), #c850ff);
    transition: width .25s;
  }
  #load-pct { font-size: 12px; color: #5d6b80; letter-spacing: 2px; }
  #enter-btn {
    font-family: inherit; font-size: 15px; letter-spacing: 4px; font-weight: 600;
    color: #05070c; background: linear-gradient(90deg, var(--accent), #7defff);
    border: none; border-radius: 30px; padding: 15px 38px; cursor: pointer;
    box-shadow: 0 0 30px rgba(65, 216, 255, .35);
    transition: transform .15s, box-shadow .15s;
  }
  #enter-btn:hover { transform: scale(1.05); box-shadow: 0 0 44px rgba(65, 216, 255, .55); }
  .load-hint { margin-top: 16px; font-size: 11px; letter-spacing: 2px; color: #5d6b80; }

  /* ---------- timeline ---------- */
  #timeline {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    z-index: 20; width: min(680px, 92vw);
    background: rgba(8, 12, 20, .72);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(120, 160, 200, .18);
    border-radius: 16px; padding: 20px 34px 30px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
  }
  #tl-caption {
    text-align: center; font-size: 10px; letter-spacing: 4px; color: #7d8ba0;
    text-transform: uppercase; margin-bottom: 14px;
  }
  #tl-track {
    position: relative; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, #2a3548, #2a3548);
    cursor: pointer;
  }
  .tl-stop {
    position: absolute; top: 50%; width: 12px; height: 12px;
    transform: translate(-50%, -50%);
    background: #3a4a62; border: 2px solid #556a88; border-radius: 50%;
    cursor: pointer; transition: background .25s, border-color .25s, box-shadow .25s;
  }
  .tl-stop.past { background: #2c5a70; border-color: #3a8aa8; }
  .tl-stop.active {
    background: var(--accent); border-color: #b8f0ff;
    box-shadow: 0 0 14px var(--accent);
  }
  .tl-stop:hover { border-color: #fff; }
  .tl-label {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 13px; font-weight: 600; letter-spacing: 1px; color: #90a2b8;
    transition: color .25s, text-shadow .25s;
    user-select: none;
  }
  .tl-stop.active .tl-label { color: #fff; text-shadow: 0 0 12px var(--accent); }
  #tl-thumb {
    position: absolute; top: 50%; width: 20px; height: 20px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 35%, #fff, var(--accent) 60%);
    border-radius: 50%; box-shadow: 0 0 18px var(--accent);
    pointer-events: none;
    transition: left .3s cubic-bezier(.3, 1.4, .5, 1);
    z-index: 2;
  }

  /* ---------- era card ---------- */
  #era-card {
    position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%);
    z-index: 15; text-align: center; pointer-events: none;
    opacity: 0;
  }
  #era-card.show { animation: eracard 5s ease forwards; }
  @keyframes eracard {
    0% { opacity: 0; transform: translateX(-50%) translateY(18px); }
    8% { opacity: 1; transform: translateX(-50%) translateY(0); }
    78% { opacity: 1; }
    100% { opacity: 0; }
  }
  #era-year {
    font-size: 88px; font-weight: 100; letter-spacing: 14px; line-height: 1;
    color: #fff; text-shadow: 0 2px 30px rgba(0,0,0,.8), 0 0 60px rgba(65,216,255,.25);
  }
  #era-tag {
    font-size: 15px; letter-spacing: 8px; color: var(--gold); text-transform: uppercase;
    margin-top: 6px; text-shadow: 0 1px 10px rgba(0,0,0,.9);
  }
  #era-cap {
    font-size: 13px; color: #c8d4e0; margin-top: 10px; letter-spacing: .4px;
    text-shadow: 0 1px 8px rgba(0,0,0,.9);
  }

  /* ---------- help & buttons ---------- */
  #help {
    position: fixed; left: 16px; bottom: 14px; z-index: 15;
    font-size: 11px; color: #8a98ac; line-height: 1.75; letter-spacing: .4px;
    background: rgba(8, 12, 20, .55); backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 160, 200, .12);
    padding: 10px 14px; border-radius: 10px;
  }
  #help b { color: #cfdcea; font-weight: 600; }
  #corner-btns { position: fixed; right: 16px; bottom: 14px; z-index: 15; display: flex; gap: 8px; }
  .cbtn {
    font-size: 17px; width: 42px; height: 42px; border-radius: 10px;
    background: rgba(8, 12, 20, .6); backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 160, 200, .18); color: #cfdcea; cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .cbtn:hover { background: rgba(30, 44, 66, .8); }
  .cbtn.on { border-color: var(--accent); box-shadow: 0 0 10px rgba(65,216,255,.4); }

  @media (max-width: 640px) {
    #timeline { padding: 14px 20px 26px; }
    #era-year { font-size: 54px; letter-spacing: 8px; }
    #help { display: none; }
  }
</style>
</head>
<body>
  <div id="scene"></div>

  <div id="loading">
    <div id="load-inner">
      <div id="load-title">TIME<b>BLOCK</b></div>
      <div id="load-sub">one city block · 1945 → 2055</div>
      <div id="load-track"><div id="load-bar"></div></div>
      <div id="load-pct">warming up the timestream…</div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="timeline">
      <div id="tl-caption">— drag the timeline · watch the block transform —</div>
      <div id="tl-track"></div>
    </div>

    <div id="era-card">
      <div id="era-year">1985</div>
      <div id="era-tag">Neon &amp; Static</div>
      <div id="era-cap"></div>
    </div>

    <div id="help">
      <b>drag</b> look &nbsp;·&nbsp; <b>W A S D</b> walk &nbsp;·&nbsp; <b>E / Q</b> rise / sink &nbsp;·&nbsp;
      <b>shift</b> sprint &nbsp;·&nbsp; <b>scroll</b> dolly<br>
      <b>1–6</b> jump to era &nbsp;·&nbsp; <b>C</b> cinematic orbit &nbsp;·&nbsp; <b>M</b> mute
    </div>

    <div id="corner-btns">
      <button class="cbtn" id="btn-cine" title="Cinematic orbit (C)">🎥</button>
      <button class="cbtn" id="btn-mute" title="Mute (M)">🔊</button>
    </div>
  </div>

  <script src="lib/three.min.js"></script>
  <script src="js/util.js"></script>
  <script src="js/eras.js"></script>
  <script src="js/textures.js"></script>
  <script src="js/buildings.js"></script>
  <script src="js/props.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/pedestrians.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/city.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
